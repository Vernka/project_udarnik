<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ударник - Регистрация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #def2fe;
            min-height: 100vh;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
        }

        .container {
            max-width: 520px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.12);
            border: 2px solid #e9ecef;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .title {
            font-size: 2.8rem;
            font-weight: bold;
            margin-bottom: 12px;
            color: black;
        }

        .subtitle {
            font-size: 1.3rem;
            color: #666;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
            font-size: 1rem;
        }

        .form-input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1.15rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-input:focus {
            outline: none;
            border-color: #87CEFA;
            background: white;
            box-shadow: 0 0 12px rgba(135, 206, 250, 0.35);
        }

        .link {
            display: inline-block;
            padding: 16px 20px;
            background: #87CEFA;
            border-radius: 10px;
            text-decoration: none;
            color: black;
            font-weight: bold;
            border: 2px solid #87CEFA;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            text-align: center;
            width: 100%;
        }

        .link:hover {
            background: #4682B4;
            border-color: #4682B4;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(70, 130, 180, 0.35);
        }

        .submit-btn {
            display: inline-block;
            padding: 16px 20px;
            background: #87CEFA;
            border-radius: 10px;
            text-decoration: none;
            color: black;
            font-weight: bold;
            border: 2px solid #87CEFA;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            text-align: center;
            width: 100%;
            margin-bottom: 18px;
        }

        .submit-btn:hover {
            background: #4682B4;
            border-color: #4682B4;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(70, 130, 180, 0.35);
        }

        .alert {
            padding: 16px;
            border-radius: 10px;
            margin-bottom: 24px;
            text-align: center;
            font-weight: bold;
            font-size: 1rem;
        }

        .alert-error {
            background: #ffebee;
            border: 2px solid #f44336;
            color: #c62828;
        }

        .alert-success {
            background: #e8f5e8;
            border: 2px solid #4caf50;
            color: #2e7d32;
        }

        .form-links {
            display: flex;
            gap: 14px;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 32px 24px;
            }

            .title {
                font-size: 2.4rem;
            }

            .subtitle {
                font-size: 1.15rem;
            }

            .form-links {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 24px 18px;
            }

            .title {
                font-size: 2rem;
            }

            .form-input {
                padding: 14px;
                font-size: 1.05rem;
            }

            .submit-btn, .link {
                padding: 14px 18px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Ударник</h1>
            <p class="subtitle">Создайте новый аккаунт</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    {% if category == 'error' %}
                        <div class="alert alert-error">
                            {{ message }}
                        </div>
                    {% endif %}
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/registration" method="POST" id="registration-form">
            <div class="form-group">
                <label for="login">Логин</label>
                <input type="text" id="login" name="login" placeholder="Введите логин" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" name="password" placeholder="Введите пароль" class="form-input" required>
            </div>
            <button type="submit" class="submit-btn">Зарегистрироваться</button>
        </form>

        <div class="form-links">
            <a href="/index" class="link">Отмена</a>
            <a href="/sign_in" class="link">Войти</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.querySelector('.container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';

            setTimeout(() => {
                container.style.transition = 'all 0.6s ease';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 200);
        });
    </script>
</body>
</html>
