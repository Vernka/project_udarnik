<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ударник - Регистрация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #def2fe;
            min-height: 100vh;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 2px solid #e9ecef;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: black;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-input:focus {
            outline: none;
            border-color: #87CEFA;
            background: white;
            box-shadow: 0 0 10px rgba(135, 206, 250, 0.3);
        }

        .link {
            display: inline-block;
            padding: 15px 20px;
            background: #87CEFA;
            border-radius: 8px;
            text-decoration: none;
            color: black;
            font-weight: bold;
            border: 2px solid #87CEFA;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            text-align: center;
            width: 100%;
        }

        .link:hover {
            background: #4682B4;
            border-color: #4682B4;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(70, 130, 180, 0.3);
        }

        .submit-btn {
            display: inline-block;
            padding: 15px 20px;
            background: #87CEFA;
            border-radius: 8px;
            text-decoration: none;
            color: black;
            font-weight: bold;
            border: 2px solid #87CEFA;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
            text-align: center;
            width: 100%;
            margin-bottom: 20px;
        }

        .submit-btn:hover {
            background: #4682B4;
            border-color: #4682B4;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(70, 130, 180, 0.3);
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
            position: relative;
            transition: all 0.5s ease;
        }

        .alert.hiding {
            opacity: 0;
            transform: translateY(-20px);
            margin-bottom: 0;
            padding: 0;
            height: 0;
            overflow: hidden;
        }

        .alert-error {
            background: #ffebee;
            border: 2px solid #f44336;
            color: #c62828;
        }

        .alert-success {
            background: #e8f5e8;
            border: 2px solid #4caf50;
            color: #2e7d32;
        }

        .alert-info {
            background: #e3f2fd;
            border: 2px solid #2196f3;
            color: #1565c0;
        }

        .form-links {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }

            .title {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .form-links {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 20px 15px;
            }

            .title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">Ударник</h1>
            <p class="subtitle">Создайте новый аккаунт</p>
        </div>

        <div id="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}" id="alert-{{ loop.index }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <form action="/registration" method="POST" id="registration-form">
            <div class="form-group">
                <label for="login"></label>
                <input type="text" id="login" name="login" placeholder="Введите логин" class="form-input" required>
            </div>
            <div class="form-group">
                <label for="password"></label>
                <input type="password" id="password" name="password" placeholder="Введите пароль" class="form-input" required>
            </div>
            <button type="submit" class="submit-btn">Зарегистрироваться</button>
        </form>

        <div class="form-links">
            <a href="/index" class="link">Отмена</a>
            <a href="/sign_in" class="link">Войти</a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.querySelector('.container');
            container.style.opacity = '0';
            container.style.transform = 'translateY(20px)';

            setTimeout(() => {
                container.style.transition = 'all 0.6s ease';
                container.style.opacity = '1';
                container.style.transform = 'translateY(0)';
            }, 200);

            // Функция для скрытия сообщений
            function hideAlerts() {
                const alerts = document.querySelectorAll('.alert');
                alerts.forEach(alert => {
                    alert.classList.add('hiding');
                    setTimeout(() => {
                        if (alert.parentNode) {
                            alert.remove();
                        }
                    }, 500);
                });
            }

            // Скрываем сообщения при успешной отправке формы
            const registrationForm = document.getElementById('registration-form');
            registrationForm.addEventListener('submit', function() {
                // Проверяем, есть ли сообщения об успехе (значит регистрация прошла успешно)
                const successAlerts = document.querySelectorAll('.alert-success');
                if (successAlerts.length > 0) {
                    // Если есть успешные сообщения, скрываем все алерты
                    setTimeout(hideAlerts, 1000); // Даем пользователю прочитать сообщение
                }
            });

            // Автоматическое скрытие сообщений об ошибке через 5 секунд
            const errorAlerts = document.querySelectorAll('.alert-error, .alert-info');
            errorAlerts.forEach(alert => {
                setTimeout(() => {
                    alert.classList.add('hiding');
                    setTimeout(() => {
                        if (alert.parentNode) {
                            alert.remove();
                        }
                    }, 500);
                }, 5000);
            });

            // Сообщения об успехе скрываются только после перехода или через 3 секунды
            const successAlerts = document.querySelectorAll('.alert-success');
            successAlerts.forEach(alert => {
                setTimeout(() => {
                    alert.classList.add('hiding');
                    setTimeout(() => {
                        if (alert.parentNode) {
                            alert.remove();
                        }
                    }, 500);
                }, 3000);
            });
        });
    </script>
</body>
</html>
