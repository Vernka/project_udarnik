<!DOCTYPE html>
<html lang="en">
<head>

    <title>Регистрация</title>
</head>
<body>
<h1>Форма регистрации</h1>
<form action="/register_users" method="POST">

        <button type="submit">Зарегистрироваться</button>
    </form>

</body>
</html>
