<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Тренировка</title>
    <style>
            .link {
                display: inline-block;
                padding: 10px 20px;
                background: #87CEFA;
                border-radius: 8px;
                text-decoration: none;
                color: black;
                font-weight: bold;
            }

            .cogl {
            display: inline-block;
                padding: 10px 20px;
            background: grey;
             border-radius: 8px;
                text-decoration: none;
                color: black;
                font-weight: bold;
            }

            .glas_no {
            display: inline-block;
                padding: 10px 20px;
            background: grey;
             border-radius: 8px;
                text-decoration: none;
                color: black;
                font-weight: bold;
            }

            .glas_no.active {
            background: red;
            box-shadow: 0 0 10px red;
            }

            .glas_yes {
            display: inline-block;
                padding: 10px 20px;
                background: grey;
                border-radius: 8px;
                text-decoration: none;
                color: black;
                font-weight: bold;
            }

            .glas_yes.active {
            background: green;
            box-shadow: 0 0 10px green;
            }
        </style>
</head>
<body>
<form action="/exercise_such" method="POST">
{% if data %}
<a href="/index" class="link" align="right">Закончить тренировку</a>
              {% for elem in data %}
                    {% if elem in cogl %}
                        <a class="cogl">{{ elem }}</a>
                    {% elif elem in glas and elem.islower() %}
                        <a href="#" class="glas_no" onclick="handleGlasNo(this, '/exercise_such')">{{ elem }}</a>
                    {% else %}
                        <a href="#" class="glas_yes" onclick="handleGlasYes(this, '/exercise_such')">{{ elem.lower() }}</a>
                    {% endif %}
              {% endfor %}
{% else %}
    <h1>Тренировка закончена</h1>
    <a href="/index" class="link" align="right">Вернуться на главную страницу</a>
    <a href="/statistic" class="link" align="right">Смотреть статистику</a>
{% endif %}
</form>
<script>
    function handleGlasYes(button, redirectUrl) {
        // 1. Подсвечиваем кнопку
        button.classList.add('active');

        // 2. Блокируем повторные нажатия
        button.style.pointerEvents = 'none';

        // 3. Через 3 секунды переходим по ссылке
        setTimeout(function() {
            window.location.href = redirectUrl;
        }, 500);

        // 4. Отменяем стандартное поведение ссылки
        return false;
    }

    function handleGlasNo(button, redirectUrl) {
        // 1. Подсвечиваем кнопку
        button.classList.add('active');

        // 2. Блокируем повторные нажатия
        button.style.pointerEvents = 'none';

        // 3. Через 3 секунды переходим по ссылке
        setTimeout(function() {
            window.location.href = redirectUrl;
        }, 500);

        // 4. Отменяем стандартное поведение ссылки
        return false;
    }
</script>
</body>
</html>
