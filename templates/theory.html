<!DOCTYPE html>
    <html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>Ударник - Теория</title>

        <style>
             body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background: #FFFFFF;
            font-size: 25px;
        }

        .link {
            display: block;
            padding: 15px 20px;
            background: #87CEFA;
            border-radius: 8px;
            text-decoration: none;
            height: 30px;
            color: black;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            font-size: 25px;
        }

        h1 {
            text-align: center;
            color: black;
        }

        .section {
            background: #def2fe;
            padding: 20px;
            margin: 40px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .section-title {
            color: #3473D1;
            font-size: 24px;
            background: #def2fe;
            margin-bottom: 15px;
            padding-bottom: 5px;
            border-bottom: 2px solid #3473D1;
            font-size: 30px;
        }

       .word-list {
            background: #def2fe;
            padding: 15px;
            border-radius: 8px;
            border: 2px solid #def2fe;
            columns: 2;
            column-gap: 30px;
        }

        .word {
            padding: 8px 15px;
            background: #def2fe;
            break-inside: avoid;
            margin-bottom: 8px;

        }
    </style>
    </head>
    <body>
        <h1 align="left"><strong>Ударник</strong></h1>

        <a href="/index" class="link" align="left" style="display: inline-block;">Назад</a>

    {% for section_name, words in sections.items() %}
        <div class="section">
            <h2 class="section-title">{{ section_name }}</h2>
            <div class="word-list">
                {% for word in words %}
                <div class="word">{{ word }}</div>
                {% endfor %}
            </div>
        </div>
    {% endfor %}
     <div style="text-align: center; margin-top: 30px;">
        <a href="/index" class="link" align="center" style="display: inline-block; margin-left: 40px;">Назад на главную</a>
    </div>
    </body>
</html>
